<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>帳本小工具</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100dvh;
  background:#111;
  font-family:'SF Pro Rounded','Helvetica Neue',sans-serif;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

.widget{
  width:min(300px,88vw);
  background:#1c1c1e;
  border-radius:32px;
  padding:28px 26px 22px;
  display:flex;flex-direction:column;gap:20px;
  box-shadow:0 24px 64px rgba(0,0,0,.7);
}

/* ── 頂部月份 + 狀態點 ── */
.top-row{
  display:flex;align-items:center;justify-content:space-between;
}
.month-lbl{
  font-size:13px;font-weight:500;
  color:rgba(255,255,255,.4);letter-spacing:.3px;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:#555;transition:background .3s;
}
.dot.ok{background:#1aad5e;}
.dot.err{background:#e03535;}
.dot.loading{background:#f59e0b;animation:blink .9s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── 已支出區塊 ── */
.exp-section{display:flex;flex-direction:column;gap:6px;}
.exp-label{
  font-size:11px;font-weight:600;
  color:rgba(255,255,255,.35);
  text-transform:uppercase;letter-spacing:.9px;
}
.exp-amount{
  font-size:52px;font-weight:700;
  color:#e03535;letter-spacing:-2.5px;line-height:1;
}
.exp-amount.zero{color:rgba(255,255,255,.25);}
.exp-sub{
  font-size:12px;color:rgba(255,255,255,.3);
  margin-top:2px;
}

/* ── 快速記帳按鈕 ── */
.btn-add{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#fff;color:#111;
  border:none;border-radius:18px;
  padding:16px;
  font-size:15px;font-weight:700;
  text-decoration:none;cursor:pointer;
  transition:transform .12s,opacity .12s;
  -webkit-tap-highlight-color:transparent;
}
.btn-add:active{transform:scale(.95);opacity:.85;}
.btn-add svg{flex-shrink:0;}

/* ── 錯誤 / 載入提示 ── */
.status-msg{
  font-size:12px;color:rgba(255,255,255,.3);
  text-align:center;padding:8px 0;line-height:1.7;
}
.status-msg a{color:rgba(255,255,255,.55);text-decoration:underline;}
</style>
</head>
<body>
<div class="widget">

  <!-- 月份 + 狀態點 -->
  <div class="top-row">
    <div class="month-lbl" id="monthLbl">—</div>
    <div class="dot loading" id="dot"></div>
  </div>

  <!-- 已支出 -->
  <div class="exp-section">
    <div class="exp-label">本月已支出</div>
    <div class="exp-amount zero" id="expAmt">$—</div>
    <div class="exp-sub" id="expSub">載入中…</div>
  </div>

  <!-- 快速記帳 -->
  <a class="btn-add" href="./index.html?action=add">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    快速記帳
  </a>

</div>

<script>
const AK = 'ledger_api_url';
const dot = document.getElementById('dot');
const expAmt = document.getElementById('expAmt');
const expSub = document.getElementById('expSub');
const monthLbl = document.getElementById('monthLbl');

const now = new Date();
const mo = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
monthLbl.textContent = now.toLocaleDateString('zh-TW', {year:'numeric', month:'long'});

async function load(){
  const api = localStorage.getItem(AK) || '';

  if(!api){
    dot.className = 'dot err';
    expAmt.textContent = '$—';
    expSub.innerHTML = '請先在 <a href="./index.html">主 App → 設定</a> 輸入 API';
    return;
  }

  dot.className = 'dot loading';

  try{
    const res = await fetch(api + '?' + new URLSearchParams({action:'getTransactions'}));
    const all = await res.json();
    const txs = (Array.isArray(all) ? all : [])
      .filter(t => t.date && String(t.date).slice(0,7) === mo);

    let exp = 0, cnt = 0;
    txs.forEach(t => {
      if(t.type !== 'income'){
        exp += parseFloat(t.amount_usd) || 0;
        cnt++;
      }
    });

    dot.className = 'dot ok';
    expAmt.textContent = `$${exp.toFixed(2)}`;
    expAmt.className = 'exp-amount' + (exp === 0 ? ' zero' : '');
    expSub.textContent = cnt > 0 ? `共 ${cnt} 筆支出（USD）` : '本月尚無支出';
  }catch{
    dot.className = 'dot err';
    expAmt.textContent = '$—';
    expSub.textContent = '無法連線，請確認 API';
  }
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
